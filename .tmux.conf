# ── Prefix ────────────────────────────────────────────────────────────
# Use Ctrl-a instead of the default Ctrl-b (Ctrl-a Ctrl-a sends a literal C-a)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── General ───────────────────────────────────────────────────────────
set -g mouse on                 # click to select panes/windows, scroll, drag to resize
set -g history-limit 50000      # bigger scrollback buffer
set -sg escape-time 10          # snappier key response (no delay after Esc)
set -g base-index 1             # start window numbering at 1
setw -g pane-base-index 1       # start pane numbering at 1
set -g renumber-windows on      # renumber windows when one closes
set -g focus-events on          # let apps (vim etc.) know when tmux gains/loses focus

# True color support
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# ── Key bindings ──────────────────────────────────────────────────────
# Reload config with prefix + r
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Split panes with | and -, keeping the current directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New windows open in the current directory too
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation (prefix + h/j/k/l)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with prefix + Shift-arrow (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Copy mode ─────────────────────────────────────────────────────────
setw -g mode-keys vi            # vi-style keys in copy mode
bind Enter copy-mode            # prefix + Enter to enter copy mode
